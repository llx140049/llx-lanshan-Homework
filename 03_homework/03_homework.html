<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>克莱因澜播放器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
            gap: 40px;

        }
        .video_container {
            flex-wrap: wrap;
            flex-direction: row;
            margin-left: 100px;
            margin-right: 20px;
            margin-bottom: 40px;
            gap: 20px;
            width: calc(100% - 80px);
            display: flex;
            justify-content: flex-start;/*元素靠左对齐*/
            

        }
        .video {
            width: 280px;
            background-color: rgb(255, 255, 255);
            border-radius: 10px;
            overflow: hidden;
            
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            transition: transform 0.3s ease;
        }
        .video:hover {
            transform: translateY(-5px);
        }
        .video-thumb {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: cover;      /*等比缩放覆盖整个区域 */
            background-position: center;
        }
        .video-info {
            padding: 10px;
        }
        .video-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 16px;
            color: rgb(2, 40, 115);
            display: flex;
            flex-direction: column;
            height: 3em;
            overflow: hidden;
            
        }
        .video-channel {
            color:#5e696d;
            font-size: 14px;
            margin-bottom: 5px;
            margin-top: 5px;
        }
        .video-look-begin {
            color: #7f848e;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .duration {
            background-color: rgba(0,0,0,0.7);
            color: white;
            font-size: 13px;
            
            padding: 3px 6px;
            bottom: 10px;
            right: 10px;
            position: absolute;
            border-radius: 3px;

        }
        .thumb1 {
            background-image: url('video1.jpg');
        }
        .thumb2 {
            background-image: url('video2.jpg');
        }
        .thumb3 {
            background-image: url('video3.jpg');
        }
        .thumb4 {
            background-image: url('video4.jpg');
        }
        .thumb5 {
            background-image: url('video5.jpg');
        }
        .thumb6 {
            background-image: url('video6.jpg');
        }

        @media (max-width: 768px) {
            .video {
                width: 100%;
                max-width: 400px;
            }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .video {
                width: calc(50% - 20px);
            }
        }
        @media (min-width: 1025px) {
            .video {
                width: calc(33.33% - 20px);
            }
        }
        .down-info-container {
            background-color: rgb(2, 40, 115);
            color: aliceblue;
            font-size: small;
            height:150px;
            width: 100%;
            
            
        }
        .down-info {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 13px;
            padding: 6px 12px;
        }
        .header-contianer {
            background-color: rgb(2, 40, 115);
            color: aliceblue;
            font-size: small;
            display: flex;
            justify-content: space-between;
            height:80px;
            width: 100%;
            margin-bottom: 20px;
        }
        .header-title {
            font-size: 30px;
            padding: 12px 12px 12px;
            
        }
        .header-submit {
            font-size: 30px;
            padding: 12px 12px 12px;
        }
        ul {
            list-style-type: none;
            margin-top: 100px;
            margin-bottom: 170px;
            padding: 0;
            width: 80px;
           
            background-color: rgba(2, 40, 115, 0.158);
            position: absolute;
            
            
        }
        li a {/*li a 意为此选择器只对li里面的a有效*/
            display: block;
            color: rgb(2, 40, 115);
            padding: 8px 16px;
            text-decoration:none;/*去掉下划线*/                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          

        }
        li a.active {
            background-color: #7f848e;
            color: white;

        }
        li a:hover {
            background-color: #7f848e;
            color: white;
        }


    </style>
</head>
